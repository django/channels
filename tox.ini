[tox]
envlist =
    py{310,311,312,313,314}-dj52
    py{312,313,314}-dj60
    py{312,313,314}-dj61
    py{312,313,314}-djmain
    qa

[testenv]
extras = tests, daphne
commands =
    pytest -v {posargs}
deps =
    dj52: Django>=5.2,<6.0
    dj60: Django>=6.0,<6.1
    dj61: Django>=6.1b1,<6.2
    djmain: https://github.com/django/django/archive/main.tar.gz

[testenv:qa]
skip_install=true
deps =
    black
    flake8
    isort
commands =
    flake8 channels tests
    black --check channels tests
    isort --check-only --diff channels tests
